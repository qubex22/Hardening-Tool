name: Build and Test harden-sles15

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'build.sh'
      - 'Dockerfile.build'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: '1.21'
  IMAGE_NAME: harden-sles15-builder
  CONTEXT: .

jobs:
  # Check code compiles natively (fast)
  compile-check:
    name: Compile check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Validate Go modules
        run: go mod tidy

      - name: Run unit tests
        run: go test -v -count=1 ./...

      - name: Cross-compile check (Linux/amd64)
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o harden-sles15.bin .

      - name: Build fingerprint-collector
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o fingerprint-collector ./fingerprint-collector.go

  # Full build with embedded Python (runs in container using bci-go, no SLES license needed)
  build-with-docker:
    name: Build with Docker (bci-go)
    runs-on: ubuntu-latest
    needs: compile-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build with Docker
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT }}
          file: ./Dockerfile.build
          tags: ${{ env.IMAGE_NAME }}:latest
          outputs: type=local,dest=./docker-output
          cache-from: type:gha
          cache-to: type:gha,mode=max

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: harden-sles15-linux-amd64
          path: docker-output/harden-sles15.bin
          retention-days: 7

      - name: Show binary info
        run: |
          ls -lh docker-output/harden-sles15.bin
          file docker-output/harden-sles15.bin || true

  # Test fingerprint collection on native
  test-fingerprint:
    name: Test fingerprint collection
    runs-on: ubuntu-latest
    needs: compile-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Test fingerprint package
        run: go test -v harden-sles15/fingerprint -run TestCollectAndHash

      - name: Test fingerprint determinism
        run: go test -v harden-sles15/fingerprint -run TestDeterministicHash

      - name: Test fingerprint normalized output
        run: go test -v harden-sles15/fingerprint -run TestNormalizedOutput

  # Integration test - verify license/runner
  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: compile-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Test license package
        run: go test -v harden-sles15/license

      - name: Test ansible_runner
        run: |
          go mod tidy
          go test -v harden-sles15/ansible_runner

      - name: Test main package structure
        run: go test -v harden-sles15
