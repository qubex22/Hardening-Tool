name: Test Fingerprint Collector

on:
  push:
    paths:
      - 'fingerprint/**'
      - 'fingerprint-collector.go'
  pull_request:
    paths:
      - 'fingerprint/**'
      - 'fingerprint-collector.go'
  workflow_dispatch:

jobs:
  test-fingerprint-go:
    name: Go Fingerprint Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run fingerprint unit tests
        run: |
          echo "Running fingerprint tests..."
          go test ./fingerprint/... -v -race

      - name: Test fingerprint collector binary
        run: |
          go build -o fingerprint-collector ./fingerprint-collector.go
          ./fingerprint-collector --help
          ./fingerprint-collector || true
